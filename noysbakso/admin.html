<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@300&display=swap');

body{
display:flex;
background:#f4f6f9;
font-family: 'Ubuntu', sans-serif;
margin:0;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#2c3e50;
min-height:100vh;
color:white;
position:fixed;
left:0;
top:0;

display:flex;
flex-direction:column;
justify-content:space-between;
}

.sidebar h2{
text-align:center;
margin:20px 0;
}

/* MENU */
.menu a{
display:block;
color:white;
padding:15px;
text-decoration:none;
}

.menu a:hover{
background:#34495e;
}

/* LOGOUT */
.logout{
padding:10px;
}

.logout a{
display:block;
background:#e74c3c;
padding:12px;
text-align:center;
color:white;
text-decoration:none;
border-radius:8px;
}

.logout a:hover{
background:#c0392b;
}

/* CONTENT */
.content{
flex:1;
padding:30px;
margin-left:220px;
}

/* CARD */
.card-stat{
border-radius:10px;
padding:20px;
color:white;
}

.bg1{background:#3498db;}
.bg2{background:#2ecc71;}
.bg3{background:#9b59b6;}

.chart-box{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div>
        <h2>Admin Panel</h2>

        <div class="menu">
            <a href="admin.html">Dashboard</a>
            <a href="produk.php">Produk</a>
            <a href="pesanan.php">Pesanan</a>
            <a href="penjualan.php">Penjualan</a>
        </div>
    </div>

    <!-- LOGOUT -->
    <div class="logout">
        <a href="logout.php">Logout</a>
    </div>

</div>


<!-- CONTENT -->
<div class="content">

<h3 class="mb-4">Data Penjualan</h3>

<!-- STAT -->
<div class="row mb-4">

<div class="col-md-4">
<div class="card-stat bg1">
<h5>Total Pesanan</h5>
<h3 id="totalPesanan">0</h3>
</div>
</div>

<div class="col-md-4">
<div class="card-stat bg2">
<h5>Total Pendapatan</h5>
<h3 id="totalPendapatan">0</h3>
</div>
</div>

<div class="col-md-4">
<div class="card-stat bg3">
<h5>Produk Terjual</h5>
<h3 id="totalProduk">0</h3>
</div>
</div>

</div>

<!-- CHART -->
<div class="row">

<div class="col-md-4">
<div class="chart-box">
<h5>Produk Terjual</h5>
<canvas id="pieChart"></canvas>
</div>
</div>

<div class="col-md-8">
<div class="chart-box">
<h5>Tren Penjualan</h5>
<canvas id="lineChart"></canvas>
</div>
</div>

</div>

<div class="row">

<div class="col-md-12">
<div class="chart-box">
<h5>Top Produk Terlaris</h5>
<canvas id="barChart"></canvas>
</div>
</div>

</div>

</div>

<script src="admin.js"></script>

</html>
